# 1. H2 en memoria con MODO COMPATIBILIDAD MySQL activado
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Forzar expl\u00EDcitamente H2 (usando ambas propiedades posibles de Spring/Hibernate)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 3. Comportamiento de las tablas
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 4. Optimizaci\u00F3n para tests
spring.devtools.restart.enabled=false
management.endpoints.enabled-by-default=false
# 5. API Key de aplicacion para ApiKeyInterceptor (mismo valor usado en los tests via header X-App-Client)
app.security.client-key=test-key-123