# ===============================================================================================
# PROPERTY SERVICE - APPLICATION PROPERTIES
# Puerto: 8082
# ===============================================================================================

# ===============================================================================================
# SERVER CONFIGURATION
# ===============================================================================================
server.port=8082
spring.application.name=property-service

# ===============================================================================================
# DATABASE CONFIGURATION - MySQL
# ===============================================================================================
spring.datasource.url=jdbc:mysql://leaseflow-mysql-leaseflow.f.aivencloud.com:20925/leaseflow_properties?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
spring.datasource.password=AVNS_xs30LdJ3llU6W5fmKnm

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================================================================
# JPA / HIBERNATE CONFIGURATION
# ===============================================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================================================================================
# LOGGING CONFIGURATION
# ===============================================================================================
logging.level.root=INFO
logging.level.com.rentify.propertyservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

# ===============================================================================================
# MICROSERVICES CONFIGURATION
# ===============================================================================================
microservices.user-service.url=http://localhost:8081
microservices.application-service.url=http://localhost:8084
microservices.document-service.url=http://localhost:8083
microservices.review-service.url=http://localhost:8086
microservices.contact-service.url=http://localhost:8085

# ===============================
# WebClient Configuration
# ===============================
spring.webflux.base-path=/
webclient.timeout.connection=15000
webclient.timeout.response=15000

# ===============================================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===============================================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.packagesToScan=com.rentify.propertyservice.controller
springdoc.pathsToMatch=/api/**

# ===============================================================================================
# SPRING BOOT ACTUATOR
# ===============================================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================================================================================
# FILE UPLOAD CONFIGURATION
# ===============================================================================================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================================================================================
# SPRING PROFILES
# ===============================================================================================
spring.profiles.active=dev

# ===============================================================================================
# CUSTOM PROPERTIES - AUTO-POBLACI\uFFFDN
# ===============================================================================================
# Habilitar/deshabilitar auto-poblaci\uFFFDn al iniciar
app.init.populate-on-startup=true

# Habilitar/deshabilitar datos de prueba (propiedades de ejemplo)
app.init.load-test-data=true

# ===============================
# Seguridad - API Key de aplicacion (anti acceso directo por navegador)
# ===============================
# Este valor debe ser EXACTAMENTE el mismo en los 6 microservicios
# y en el archivo .env del Frontend (VITE_APP_CLIENT_KEY).
# En produccion (Azure), sobreescribir via variable de entorno:
# APP_SECURITY_CLIENT_KEY=<valor-secreto>
app.security.client-key=${APP_SECURITY_CLIENT_KEY:rentify-leaseflow-dev-key-2026}